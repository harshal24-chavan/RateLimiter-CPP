syntax = "proto3";

package ratelimiter;

// The individual check
message IndividualCheck {

  // The identifier (IP, API Key, or UserID)
  string user_id = 1;
}

// The Batch Request
message BatchCheckRequest {
  string endpoint = 1;
  repeated IndividualCheck checks = 2;
}

// The individual result
message IndividualResult {
  bool allowed = 1;
  int32 remaining_tokens = 2;
}

// The Batch Response
message BatchCheckResponse { repeated IndividualResult results = 1; }

service RateLimitService {
  // Batched RPC
  rpc CheckBatch(BatchCheckRequest) returns (BatchCheckResponse) {}
}
